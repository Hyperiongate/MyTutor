<!DOCTYPE html>
<!--
  =============================================================================
  session.html  --  Math Tutor MVP  --  Hyperion Shift LLC
  -----------------------------------------------------------------------------
  CHANGE NOTES (keep newest at top):
    2026-07-19  VOICE-FIRST REWRITE. This screen is now the voice tutor:
                  - Large avatar (image at /static/avatar.jpg) that glows while
                    the tutor is speaking; falls back to an animated orb if the
                    image is missing.
                  - "Tap to talk" mic button using the browser's built-in speech
                    recognition (student speech -> text). No API keys, no cost.
                  - Tutor replies are spoken aloud with the browser's built-in
                    speech synthesis (a female voice is chosen when available).
                  - Live captions show what was heard and what the tutor said.
                  - Still loads remembered history and calls the same /api/chat
                    backend (no backend changes were needed).
                  - Graceful fallback: if the browser has no speech recognition
                    (e.g. some non-Chrome browsers), a text box appears so the
                    student can still type. Voice is the primary experience.
    2026-07-19  Initial text-only session screen (superseded by the rewrite).
  =============================================================================
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Math Tutor — Session</title>
  <style>
    :root { --ink:#1c2430; --muted:#5d6b7a; --line:#dfe5ec; --accent:#2f6df6;
            --tutor:#eef3fe; --student:#e8f7ee; --glow:#7fb0ff; }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto,
      Helvetica, Arial, sans-serif; color: var(--ink);
      background: radial-gradient(1200px 600px at 50% -10%, #eaf1ff, #f5f7fa 60%);
      display: flex; flex-direction: column; height: 100vh;
    }

    header {
      display: flex; align-items: center; gap: 10px; padding: 12px 18px;
    }
    header .title { font-weight: 600; font-size: 15px; }
    header .spacer { flex: 1; }
    header a { font-size: 13px; color: var(--muted); text-decoration: none; }

    /* ---- Avatar ---- */
    .stage {
      flex: 0 0 auto; display: flex; flex-direction: column; align-items: center;
      padding: 6px 18px 2px;
    }
    .avatar-wrap {
      position: relative; width: 180px; height: 180px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-img, .avatar-orb {
      width: 180px; height: 180px; border-radius: 50%; object-fit: cover;
      box-shadow: 0 6px 24px rgba(20,30,45,.18);
      transition: box-shadow .2s ease, transform .2s ease;
    }
    .avatar-orb {
      background: radial-gradient(circle at 32% 30%, var(--glow), var(--accent) 72%);
    }
    /* the glow/pulse while the tutor is speaking */
    .avatar-wrap.speaking .avatar-img,
    .avatar-wrap.speaking .avatar-orb {
      animation: speak 1.0s ease-in-out infinite;
      box-shadow: 0 0 0 0 rgba(47,109,246,.55), 0 6px 24px rgba(20,30,45,.18);
    }
    @keyframes speak {
      0%   { box-shadow: 0 0 0 0 rgba(47,109,246,.55), 0 6px 24px rgba(20,30,45,.18); transform: scale(1); }
      60%  { box-shadow: 0 0 0 20px rgba(47,109,246,0), 0 6px 24px rgba(20,30,45,.18); transform: scale(1.03); }
      100% { box-shadow: 0 0 0 0 rgba(47,109,246,0), 0 6px 24px rgba(20,30,45,.18); transform: scale(1); }
    }
    .tutor-name { margin-top: 12px; font-weight: 700; font-size: 18px; }
    .student-name { font-size: 13px; color: var(--muted); }
    .status { margin-top: 6px; font-size: 13px; color: var(--accent); min-height: 18px; }

    /* ---- Captions / transcript ---- */
    main {
      flex: 1; overflow-y: auto; padding: 12px 18px; display: flex;
      flex-direction: column; gap: 8px; max-width: 720px; width: 100%;
      margin: 0 auto;
    }
    .bubble { padding: 9px 13px; border-radius: 14px; max-width: 82%;
      font-size: 15px; line-height: 1.45; white-space: pre-wrap; }
    .bubble.tutor { background: var(--tutor); align-self: flex-start;
      border-bottom-left-radius: 4px; }
    .bubble.student { background: var(--student); align-self: flex-end;
      border-bottom-right-radius: 4px; }
    .bubble.system { align-self: center; background: transparent;
      color: var(--muted); font-size: 13px; text-align: center; }

    /* ---- Controls ---- */
    footer {
      padding: 12px 18px 20px; display: flex; flex-direction: column;
      align-items: center; gap: 10px;
    }
    .mic {
      width: 74px; height: 74px; border-radius: 50%; border: none; cursor: pointer;
      background: var(--accent); color: #fff; font-size: 30px; line-height: 1;
      box-shadow: 0 6px 18px rgba(47,109,246,.35);
      display: flex; align-items: center; justify-content: center;
      transition: transform .1s ease, background .2s ease;
    }
    .mic:active { transform: scale(.96); }
    .mic.listening { background: #e0392b; animation: micpulse 1.1s ease-in-out infinite; }
    .mic:disabled { opacity: .5; cursor: default; }
    @keyframes micpulse {
      0%   { box-shadow: 0 0 0 0 rgba(224,57,43,.5); }
      70%  { box-shadow: 0 0 0 16px rgba(224,57,43,0); }
      100% { box-shadow: 0 0 0 0 rgba(224,57,43,0); }
    }
    .mic-hint { font-size: 13px; color: var(--muted); }
    .replay { font-size: 12px; color: var(--muted); background: none; border: none;
      cursor: pointer; text-decoration: underline; }

    /* text fallback (hidden unless speech recognition is unavailable) */
    .composer { display: none; gap: 8px; width: 100%; max-width: 480px; }
    .composer.show { display: flex; }
    .composer input {
      flex: 1; font-size: 15px; padding: 11px 13px; border: 1px solid var(--line);
      border-radius: 12px; outline: none;
    }
    .composer input:focus { border-color: var(--accent); }
    .composer button {
      font-size: 15px; padding: 11px 16px; background: var(--accent); color: #fff;
      border: none; border-radius: 12px; cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <div class="title" id="headerTitle">Math Tutor</div>
    <div class="spacer"></div>
    <a href="/">Exit</a>
  </header>

  <div class="stage">
    <div class="avatar-wrap" id="avatarWrap">
      <!-- The avatar image. If /static/avatar.jpg is missing, we swap to an orb. -->
      <img id="avatarImg" class="avatar-img" src="/static/avatar.jpg" alt="Tutor avatar" />
    </div>
    <div class="tutor-name" id="tutorName">Tutor</div>
    <div class="student-name" id="studentName">&nbsp;</div>
    <div class="status" id="status">&nbsp;</div>
  </div>

  <main id="log"></main>

  <footer>
    <button class="mic" id="mic" title="Tap to talk" aria-label="Tap to talk">&#127908;</button>
    <div class="mic-hint" id="micHint">Tap the mic and start talking</div>
    <button class="replay" id="replay" style="display:none;">Repeat that</button>

    <div class="composer" id="composer">
      <input id="input" placeholder="Type to your tutor…" autocomplete="off" />
      <button id="send">Send</button>
    </div>
  </footer>

  <script>
    // ==================================================================
    // Setup: who is the student (from the login code in the URL)?
    // ==================================================================
    const params = new URLSearchParams(window.location.search);
    const CODE = (params.get("code") || "").trim();
    if (!CODE) { window.location.href = "/"; }

    const log = document.getElementById("log");
    const statusEl = document.getElementById("status");
    const tutorNameEl = document.getElementById("tutorName");
    const studentNameEl = document.getElementById("studentName");
    const headerTitleEl = document.getElementById("headerTitle");
    const avatarWrap = document.getElementById("avatarWrap");
    const avatarImg = document.getElementById("avatarImg");
    const micBtn = document.getElementById("mic");
    const micHint = document.getElementById("micHint");
    const replayBtn = document.getElementById("replay");
    const composer = document.getElementById("composer");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    let tutorName = "Tutor";
    let lastTutorText = "";
    let busy = false;

    // If the avatar image fails to load, fall back to an animated orb so the
    // screen never looks broken.
    avatarImg.addEventListener("error", () => {
      avatarImg.remove();
      const orb = document.createElement("div");
      orb.className = "avatar-orb";
      avatarWrap.appendChild(orb);
    });

    function setStatus(text) { statusEl.textContent = text || " "; }

    function addBubble(role, text) {
      const div = document.createElement("div");
      div.className = "bubble " + role;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      return div;
    }

    // ==================================================================
    // SPEAKING: the browser reads the tutor's reply aloud.
    // ==================================================================
    let femaleVoice = null;
    function pickVoice() {
      const voices = window.speechSynthesis ? speechSynthesis.getVoices() : [];
      if (!voices || !voices.length) return;
      // Prefer an English voice that is likely female.
      const preferred = ["samantha", "zira", "google us english", "victoria",
                         "female", "karen", "moira", "tessa", "fiona"];
      const en = voices.filter(v => /en(-|_)?/i.test(v.lang));
      for (const name of preferred) {
        const hit = en.find(v => v.name.toLowerCase().includes(name));
        if (hit) { femaleVoice = hit; return; }
      }
      femaleVoice = en[0] || voices[0];
    }
    if (window.speechSynthesis) {
      pickVoice();
      speechSynthesis.onvoiceschanged = pickVoice;
    }

    // Make spoken math sound natural (the on-screen caption keeps the symbols).
    function forSpeech(text) {
      return text
        .replace(/\s*=\s*/g, " equals ")
        .replace(/\s*\+\s*/g, " plus ")
        .replace(/(\d)\s*-\s*(\d)/g, "$1 minus $2")
        .replace(/\s*\*\s*/g, " times ")
        .replace(/\s*\/\s*/g, " divided by ");
    }

    function speak(text) {
      if (!window.speechSynthesis) return;
      try {
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(forSpeech(text));
        if (femaleVoice) u.voice = femaleVoice;
        u.rate = 1.0; u.pitch = 1.05;
        u.onstart = () => { avatarWrap.classList.add("speaking"); };
        u.onend = () => { avatarWrap.classList.remove("speaking"); };
        u.onerror = () => { avatarWrap.classList.remove("speaking"); };
        speechSynthesis.speak(u);
      } catch (e) { /* speaking is best-effort */ }
    }

    replayBtn.addEventListener("click", () => { if (lastTutorText) speak(lastTutorText); });

    // ==================================================================
    // LISTENING: the browser turns the student's speech into text.
    // ==================================================================
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let listening = false;

    if (SR) {
      recognition = new SR();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        listening = true;
        micBtn.classList.add("listening");
        setStatus("Listening…");
        micHint.textContent = "Listening — tap again to stop";
      };
      recognition.onerror = (e) => {
        listening = false;
        micBtn.classList.remove("listening");
        if (e.error === "not-allowed" || e.error === "service-not-allowed") {
          setStatus("Microphone blocked — allow mic access and try again.");
        } else if (e.error === "no-speech") {
          setStatus("I didn't catch that — tap the mic and try again.");
        } else {
          setStatus("");
        }
        micHint.textContent = "Tap the mic and start talking";
      };
      recognition.onend = () => {
        listening = false;
        micBtn.classList.remove("listening");
        if (!busy) micHint.textContent = "Tap the mic and start talking";
      };
      recognition.onresult = (event) => {
        const said = event.results[0][0].transcript.trim();
        if (said) handleStudentMessage(said);
      };
    } else {
      // No speech recognition in this browser -> show the text fallback.
      composer.classList.add("show");
      micBtn.style.display = "none";
      micHint.textContent = "Voice isn't supported in this browser — type instead. (Chrome works best.)";
    }

    function toggleListen() {
      if (!recognition || busy) return;
      if (listening) { try { recognition.stop(); } catch (e) {} return; }
      // Tapping the mic is also the user gesture that unlocks audio playback.
      try { recognition.start(); } catch (e) { /* already started */ }
    }
    micBtn.addEventListener("click", toggleListen);

    // ==================================================================
    // TALKING TO THE TUTOR: send text to /api/chat, show + speak the reply.
    // ==================================================================
    async function handleStudentMessage(message) {
      if (busy) return;
      busy = true;
      addBubble("student", message);
      setStatus(tutorName + " is thinking…");
      micBtn.disabled = true;
      sendBtn && (sendBtn.disabled = true);
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code: CODE, message })
        });
        const data = await res.json();
        const reply = res.ok ? data.reply : (data.detail || "Sorry, something went wrong.");
        addBubble("tutor", reply);
        lastTutorText = reply;
        replayBtn.style.display = "inline";
        setStatus("");
        speak(reply);
      } catch (err) {
        addBubble("tutor", "I couldn't reach the server. Please try again.");
        setStatus("");
      } finally {
        busy = false;
        micBtn.disabled = false;
        sendBtn && (sendBtn.disabled = false);
        micHint.textContent = "Tap the mic and start talking";
      }
    }

    // Text fallback handlers.
    function sendTyped() {
      const message = (input.value || "").trim();
      if (!message) return;
      input.value = "";
      handleStudentMessage(message);
    }
    if (sendBtn) sendBtn.addEventListener("click", sendTyped);
    if (input) input.addEventListener("keydown", (e) => { if (e.key === "Enter") sendTyped(); });

    // ==================================================================
    // On load: greet, and replay any remembered conversation.
    // ==================================================================
    async function loadSession() {
      try {
        const res = await fetch("/api/session/" + encodeURIComponent(CODE));
        if (!res.ok) { window.location.href = "/"; return; }
        const data = await res.json();
        tutorName = data.tutor_name || "Tutor";
        tutorNameEl.textContent = tutorName;
        headerTitleEl.textContent = "Math Tutor";
        avatarImg.alt = tutorName;
        studentNameEl.textContent = data.name ? ("Student: " + data.name) : "";

        const history = data.history || [];
        if (history.length === 0) {
          addBubble("system", "Tap the mic and say hello to start.");
        } else {
          addBubble("system", "Welcome back — picking up where you left off.");
          for (const m of history) {
            addBubble(m.role === "assistant" ? "tutor" : "student", m.content);
          }
          const lastTutor = [...history].reverse().find(m => m.role === "assistant");
          if (lastTutor) { lastTutorText = lastTutor.content; replayBtn.style.display = "inline"; }
        }
      } catch (err) {
        window.location.href = "/";
      }
    }

    loadSession();
  </script>
</body>
</html>
