<!DOCTYPE html>
<!--
  =============================================================================
  topic.html  --  Math Tutor MVP  --  Hyperion Shift LLC
  -----------------------------------------------------------------------------
  CHANGE NOTES (keep newest at top):
    2026-07-21  New TOPIC mode ("explore a topic"), reached from the home hub. The
                student picks one of the 9 Algebra I units (tap) OR types/says any
                topic, then Mr. Cadabra gives a focused mini-lesson on JUST that topic
                -- same voice orb, tap-to-talk, whiteboard visuals ([[balance]]/[[card]])
                and quick buttons as the lesson, talking to POST /api/topic. Topic
                history is held here in the browser and posted each turn -- nothing is
                saved yet (real per-topic tracking is the next phase). Reuses the proven
                speak()/tap-to-talk code (stall watchdog + control-tag leak guard).
  =============================================================================
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Math Tutor — Explore a Topic</title>
  <style>
    :root {
      --ink:#26263a; --muted:#6b6f82; --line:#e7e6f2; --accent:#5b5bd6; --accent2:#14b8a6;
      --warm:#ff7a59; --tutor:#eeeeff; --student:#e6f7f1; --panel:#ffffff; --wood:#b9852f; --ok:#16a34a;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; color: var(--ink);
      background:
        radial-gradient(760px 500px at 6% -10%, rgba(91,91,214,.16), transparent 60%),
        radial-gradient(760px 480px at 96% -6%, rgba(20,184,166,.15), transparent 55%),
        radial-gradient(700px 520px at 60% 112%, rgba(255,122,89,.12), transparent 55%),
        #f5f5fc;
    }
    .center { display: flex; flex-direction: column; height: 100vh; min-width: 0; max-width: 1000px; margin: 0 auto; }
    .topbar { display: flex; align-items: center; padding: 12px 20px; }
    .topbar .title { font-weight: 800; font-size: 16px;
      background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text;
      background-clip: text; -webkit-text-fill-color: transparent; }
    .topbar .spacer { flex: 1; }
    .topbar a { font-size: 13px; color: var(--muted); text-decoration: none; }

    .tutor-head { display: flex; align-items: center; gap: 18px; padding: 4px 22px 16px; }
    .tutor-id { display: flex; align-items: center; gap: 12px; flex: 0 0 auto; }
    .orbwrap { width: 96px; height: 96px; flex: 0 0 auto; }
    .orbwrap canvas { width: 100%; height: 100%; display: block; }
    .tutor-name { font-weight: 800; font-size: 18px; }
    .status { font-size: 13px; color: var(--accent); min-height: 18px; margin-top: 2px; font-weight: 600; }
    .convo { flex: 1; align-self: stretch; max-height: 150px; overflow-y: auto; display: flex;
      flex-direction: column; justify-content: center; gap: 8px; padding: 6px 6px; }

    .topicbar { display: none; align-items: center; gap: 10px; margin: 0 24px 2px; padding: 10px 16px;
      border-radius: 14px; font-size: 15px; line-height: 1.3;
      background: linear-gradient(90deg, rgba(20,184,166,.16), rgba(91,91,214,.10)); border: 1px solid var(--line); }
    .topicbar.show { display: flex; }
    .topicbar .ti { font-size: 18px; flex: 0 0 auto; }
    .topicbar .tl { color: var(--muted); font-weight: 700; text-transform: uppercase; font-size: 11px;
      letter-spacing: .05em; flex: 0 0 auto; }
    .topicbar b { color: var(--ink); }

    .stage { flex: 1; margin: 8px 24px 14px; border-radius: 20px; background: var(--panel);
      border: 1px solid var(--line); box-shadow: 0 12px 36px rgba(20,30,45,.08);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 22px; min-height: 300px; position: relative; overflow: hidden; }
    .stage-hint { color: var(--muted); font-size: 14px; text-align: center; }

    .scale { width: 100%; max-width: 580px; }
    .scale .beamwrap { position: relative; height: 190px; }
    .scale .pivot { position: absolute; left: 50%; bottom: 0; transform: translateX(-50%);
      width: 0; height: 0; border-left: 30px solid transparent; border-right: 30px solid transparent;
      border-bottom: 104px solid #9aa7b6; }
    .scale .beam { position: absolute; left: 9%; right: 9%; top: 42px; height: 10px;
      background: var(--wood); border-radius: 6px; transform-origin: 50% 50%;
      transition: transform .7s cubic-bezier(.34,1.2,.5,1); }
    .scale .pan { position: absolute; top: 38px; width: 168px; transform: translateX(-50%); text-align: center; }
    .scale .pan.left { left: 12%; } .scale .pan.right { left: 88%; }
    .scale .tray { min-height: 58px; border: 2px solid #c9d2dd; border-top: none;
      border-radius: 0 0 78px 78px; background: #f7fafc; padding: 8px 8px 12px;
      display: flex; flex-wrap: wrap; gap: 3px; align-items: center; justify-content: center;
      font-size: 28px; line-height: 1; }
    .scale .rope { height: 30px; width: 2px; background: #c9d2dd; margin: 0 auto; }
    .scale .label { margin-top: 10px; font-weight: 700; font-size: 22px; }
    .scale .box { display: inline-flex; align-items: center; justify-content: center;
      min-width: 40px; height: 40px; padding: 0 8px; border-radius: 8px; background: #ffe6b0;
      border: 2px solid var(--wood); font-size: 19px; font-weight: 700; color: #6b4c15; }
    .scale .eq { text-align: center; margin-top: 12px; font-size: 17px; color: var(--muted); }
    .scale .cap { text-align: center; margin-top: 8px; font-size: 15px; }
    .pop { animation: pop .4s ease; }
    @keyframes pop { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .qcard { width: 100%; max-width: 480px; text-align: left; }
    .qcard .qtitle { font-weight: 700; font-size: 17px; margin-bottom: 12px; text-align: center; }
    .qcard ul { list-style: none; margin: 0; padding: 0; }
    .qcard li { background: #f2f6fc; border: 1px solid var(--line); border-left: 4px solid var(--accent);
      border-radius: 10px; padding: 10px 13px; margin-bottom: 9px; font-size: 15px; line-height: 1.35; }
    .qcard .qcap { text-align: center; margin-top: 4px; font-size: 14px; color: var(--muted); }

    /* Coordinate grapher */
    .graphwrap { width: 100%; max-width: 440px; text-align: center; }
    .grapher { width: 100%; height: auto; display: block; border-radius: 12px; }
    .glegend { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 8px; }
    .glg { font-size: 14px; font-weight: 700; }
    .graphwrap .cap { text-align: center; margin-top: 6px; font-size: 15px; color: var(--ink); }


    .bubble { padding: 10px 14px; border-radius: 15px; max-width: 92%; font-size: 15px;
      line-height: 1.45; white-space: pre-wrap; }
    .bubble.tutor { background: var(--tutor); align-self: flex-start; border-bottom-left-radius: 5px; }
    .bubble.tutor.latest { box-shadow: 0 3px 14px rgba(91,91,214,.18); }
    .bubble.student { background: var(--student); align-self: flex-end; border-bottom-right-radius: 5px; }
    .bubble.system { align-self: center; background: transparent; color: var(--muted); font-size: 13px; }

    .controls { padding: 8px 20px 18px; display: flex; flex-direction: column; align-items: center; gap: 9px; }
    .live { min-height: 24px; font-size: 17px; font-weight: 600; color: var(--ink); text-align: center; max-width: 620px; line-height: 1.3; }
    .talkbtn { border: none; border-radius: 30px; font-size: 17px; font-weight: 800; padding: 15px 30px;
      display: inline-flex; align-items: center; gap: 9px; color: #fff; background: #c3ccd8; cursor: default;
      transition: background .2s ease, box-shadow .2s ease, transform .08s ease; }
    .talkbtn.ready { background: linear-gradient(90deg, var(--accent), var(--accent2)); cursor: pointer; animation: talkglow 1.5s ease-in-out infinite; }
    .talkbtn.ready:active { transform: scale(.97); }
    .talkbtn.recording { background: #e0392b; cursor: pointer; animation: recpulse 1.15s ease-in-out infinite; }
    @keyframes talkglow { 0%,100% { box-shadow: 0 8px 20px rgba(91,91,214,.32); } 50% { box-shadow: 0 10px 30px rgba(91,91,214,.65); } }
    @keyframes recpulse { 0% { box-shadow: 0 0 0 0 rgba(224,57,43,.5); } 70% { box-shadow: 0 0 0 18px rgba(224,57,43,0); } 100% { box-shadow: 0 0 0 0 rgba(224,57,43,0); } }
    .hint { font-size: 13px; color: var(--muted); }
    .quickrow { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .quick { border: 1.5px solid var(--line); background: #fff; border-radius: 22px; padding: 9px 16px;
      font-size: 14px; font-weight: 700; cursor: pointer; color: var(--ink); }
    .quick:not(:disabled):hover { background: #f5f5fc; }
    .quick:disabled { opacity: .4; cursor: default; }
    .quick.yes { color: var(--ok); border-color: #bfe6cd; }
    .quick.no { color: #c0392b; border-color: #f3c6c6; }
    .quick.conf { color: var(--accent); border-color: #ccccf2; }
    .quick.newp { color: var(--accent2); border-color: #b9e8e0; }
    .link { font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; text-decoration: underline; }
    .composer { display: none; gap: 8px; width: 100%; max-width: 460px; }
    .composer.show { display: flex; }
    .composer input { flex: 1; font-size: 15px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 11px; outline: none; }
    .composer button { font-size: 15px; padding: 10px 15px; background: var(--accent); color: #fff; border: none; border-radius: 11px; cursor: pointer; }

    /* Topic-picker overlay */
    .entry { position: fixed; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center;
      padding: 20px; overflow-y: auto; background:
        radial-gradient(700px 460px at 15% 0%, rgba(91,91,214,.35), transparent 60%),
        radial-gradient(700px 460px at 90% 10%, rgba(20,184,166,.30), transparent 55%),
        radial-gradient(700px 500px at 55% 110%, rgba(255,122,89,.28), transparent 55%),
        rgba(22,22,40,.72); }
    .entry.hide { display: none; }
    .entry-card { background: #fff; border-radius: 22px; max-width: 560px; width: 100%; padding: 26px 26px 22px;
      box-shadow: 0 30px 80px rgba(0,0,0,.4); text-align: center; }
    .entry-badge { width: 62px; height: 62px; margin: 0 auto 8px; border-radius: 50%;
      background: radial-gradient(circle at 34% 30%, #a8f0e2, var(--accent2) 72%);
      box-shadow: 0 8px 22px rgba(20,184,166,.45); display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .entry-card h2 { margin: 4px 0 4px; font-size: 22px; }
    .entry-card .lead { color: var(--muted); font-size: 14px; margin: 0 0 16px; }
    .unitgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; text-align: left; }
    .unitbtn { display: flex; gap: 9px; align-items: center; background: #f7f8fe; border: 1.5px solid var(--line);
      border-radius: 12px; padding: 11px 12px; font-size: 14px; font-weight: 600; color: var(--ink); cursor: pointer; }
    .unitbtn:hover { background: #eef1fe; border-color: var(--accent); }
    .unitbtn .n { color: var(--accent); font-weight: 800; flex: 0 0 auto; }
    .entry-or { color: var(--muted); font-size: 13px; margin: 14px 0 8px; }
    .entry-row { display: flex; gap: 8px; }
    .entry-row input { flex: 1; font-size: 16px; padding: 11px 13px; border: 1px solid var(--line); border-radius: 12px; outline: none; }
    .entry-row input:focus { border-color: var(--accent); }
    .entry-mic { border: 1.5px solid var(--line); background: #fff; border-radius: 12px; padding: 0 14px;
      font-size: 15px; font-weight: 700; cursor: pointer; color: var(--accent); }
    .entry-mic.recording { background: #e0392b; color: #fff; border-color: #e0392b; animation: recpulse 1.15s ease-in-out infinite; }
    .entry-go { width: 100%; margin-top: 14px; border: none; border-radius: 26px; cursor: pointer; color: #fff;
      font-size: 16px; font-weight: 800; padding: 13px; background: linear-gradient(90deg, var(--accent), var(--accent2)); box-shadow: 0 10px 24px rgba(91,91,214,.4); }
    .entry-go:disabled { opacity: .5; cursor: default; }
    .entry-note { font-size: 12px; color: var(--muted); margin-top: 10px; min-height: 16px; }
    .entry-back { display: inline-block; margin-top: 8px; font-size: 13px; color: var(--muted); text-decoration: underline; }
  </style>
</head>
<body>
  <div class="center">
    <div class="topbar">
      <div class="title">💡 Explore a Topic with Mr. Cadabra</div>
      <div class="spacer"></div>
      <a id="homeLink" href="#">← Home</a>
    </div>

    <div class="tutor-head">
      <div class="tutor-id">
        <div class="orbwrap"><canvas id="orb" width="300" height="300"></canvas></div>
        <div class="tutor-meta">
          <div class="tutor-name">Mr. Cadabra</div>
          <div class="status" id="status">&nbsp;</div>
        </div>
      </div>
      <div class="convo" id="log"></div>
    </div>

    <div class="topicbar" id="topicBar"><span class="ti">💡</span><span class="tl">Topic</span><b id="topicText"></b></div>

    <div class="stage" id="stage"><div class="stage-hint" id="stageHint">Your topic will appear here.</div></div>

    <div class="controls">
      <div class="live" id="live"></div>
      <button class="talkbtn" id="talkBtn" disabled>🎙️ <span id="talkLabel">…</span></button>
      <div class="quickrow" id="quickRow">
        <button class="quick yes" data-say="Yes" disabled>✓ Yes</button>
        <button class="quick no" data-say="No" disabled>✗ No</button>
        <button class="quick conf" data-say="I'm confused" disabled>🤔 I'm confused</button>
        <button class="quick newp" id="newTopic" disabled>💡 New topic</button>
      </div>
      <div class="hint" id="hint">Let's dig into your topic…</div>
      <button class="link" id="typeToggle">Type instead</button>
      <div class="composer" id="composer">
        <input id="input" placeholder="Type to Mr. Cadabra…" autocomplete="off" />
        <button id="send">Send</button>
      </div>
    </div>
  </div>

  <!-- Topic-picker overlay -->
  <div class="entry" id="entry">
    <div class="entry-card">
      <div class="entry-badge">💡</div>
      <h2>What would you like to explore?</h2>
      <p class="lead">Pick a topic below — or type/say your own.</p>
      <div class="unitgrid" id="unitGrid"></div>
      <div class="entry-or">— or tell me your own —</div>
      <div class="entry-row">
        <input id="topicInput" placeholder="e.g. how slope works" />
        <button class="entry-mic" id="entryMic">🎙️</button>
      </div>
      <button class="entry-go" id="entryGo" disabled>Let's explore it →</button>
      <div class="entry-note" id="entryNote"></div>
      <a class="entry-back" id="entryBack" href="#">← Back home</a>
    </div>
  </div>

  <script>
    const el = (id) => document.getElementById(id);
    const params = new URLSearchParams(window.location.search);
    const CODE = (params.get("code") || "").trim();
    if (!CODE) { window.location.href = "/"; }
    el("homeLink").href = "/home?code=" + encodeURIComponent(CODE);
    el("entryBack").href = "/home?code=" + encodeURIComponent(CODE);

    const stage = el("stage"), statusEl = el("status"), log = el("log");
    const talkBtn = el("talkBtn"), talkLabel = el("talkLabel"), live = el("live"), hint = el("hint");
    const typeToggle = el("typeToggle"), composer = el("composer"), input = el("input"), sendBtn = el("send");

    let topic = "";
    let history = [];
    let busy = false;
    let phase = "idle";
    let elevenEnabled = false;
    let state = "idle";
    function setState(s) { state = s; }

    // The 9 Algebra I units (topic picker).
    const UNITS = [
      "Foundations & Expressions", "Linear Equations & Inequalities", "Functions & Notation",
      "Linear Functions & Graphs", "Systems of Equations", "Exponents & Exponential Functions",
      "Polynomials & Factoring", "Quadratic Functions", "Data & Statistics",
    ];

    // ---------- Audio graph ----------
    const ttsAudio = new Audio(); ttsAudio.crossOrigin = "anonymous";
    let audioCtx = null, analyser = null, timeData = null, usingAnalyser = false;
    function ensureAudioGraph() {
      if (audioCtx) { if (audioCtx.state === "suspended") audioCtx.resume(); return; }
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const src = audioCtx.createMediaElementSource(ttsAudio);
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 512;
        timeData = new Uint8Array(analyser.fftSize);
        src.connect(analyser); analyser.connect(audioCtx.destination);
      } catch (e) { audioCtx = null; analyser = null; }
    }
    function silentWavUri(ms) {
      const sampleRate = 8000;
      const numSamples = Math.max(1, Math.round(sampleRate * (ms / 1000)));
      const dataSize = numSamples;
      const buffer = new ArrayBuffer(44 + dataSize);
      const view = new DataView(buffer);
      const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
      writeStr(0, "RIFF"); view.setUint32(4, 36 + dataSize, true); writeStr(8, "WAVE");
      writeStr(12, "fmt "); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate, true);
      view.setUint16(32, 1, true); view.setUint16(34, 8, true);
      writeStr(36, "data"); view.setUint32(40, dataSize, true);
      for (let i = 0; i < numSamples; i++) view.setUint8(44 + i, 128);
      let bin = ""; const bytes = new Uint8Array(buffer);
      for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      return "data:audio/wav;base64," + btoa(bin);
    }
    let audioWarmed = false;
    async function warmUpAudio() {
      if (audioWarmed) return; audioWarmed = true; ensureAudioGraph();
      try { ttsAudio.src = silentWavUri(250); const p = ttsAudio.play(); if (p && p.then) await p.catch(() => {}); } catch (e) {}
    }

    // ---------- Orb ----------
    const orb = el("orb"), octx = orb.getContext("2d");
    let t = 0, smooth = 0, hue = 150;
    function level() {
      if (state === "speaking" && usingAnalyser && analyser) {
        analyser.getByteTimeDomainData(timeData);
        let sum = 0; for (let i = 0; i < timeData.length; i++) { const v = (timeData[i] - 128) / 128; sum += v * v; }
        return Math.min(1, Math.sqrt(sum / timeData.length) * 3.4);
      }
      if (state === "speaking") return 0.45 + 0.30 * Math.abs(Math.sin(t * 0.05));
      if (state === "thinking") return 0.30 + 0.16 * Math.sin(t * 0.10);
      if (state === "listening") return 0.16 + 0.07 * Math.sin(t * 0.05);
      return 0.10 + 0.05 * Math.sin(t * 0.035);
    }
    function drawOrb() {
      const w = orb.width, h = orb.height, cx = w / 2, cy = h / 2;
      octx.clearRect(0, 0, w, h);
      const lv = level(); smooth += (lv - smooth) * 0.22; hue += 0.15 + smooth * 0.8;
      const h1 = (hue) % 360, h2 = (hue + 55) % 360;
      const baseR = w * 0.26, R = baseR * (1 + smooth * 0.33);
      octx.save();
      const aura = octx.createRadialGradient(cx, cy, R * 0.4, cx, cy, R * 2.1);
      aura.addColorStop(0, `hsla(${h1},90%,60%,${0.30 + smooth * 0.35})`); aura.addColorStop(1, `hsla(${h1},90%,60%,0)`);
      octx.fillStyle = aura; octx.beginPath(); octx.arc(cx, cy, R * 2.1, 0, 7); octx.fill();
      octx.restore();
      octx.save();
      octx.shadowColor = `hsla(${h2},95%,60%,0.8)`; octx.shadowBlur = 34 + smooth * 40;
      octx.beginPath();
      const pts = 60;
      for (let i = 0; i <= pts; i++) {
        const a = (i / pts) * Math.PI * 2;
        const wob = 1 + (0.05 + smooth * 0.10) * Math.sin(a * 3 + t * 0.06) + (smooth * 0.06) * Math.sin(a * 5 - t * 0.05);
        const rr = R * wob, x = cx + Math.cos(a) * rr, y = cy + Math.sin(a) * rr;
        if (i === 0) octx.moveTo(x, y); else octx.lineTo(x, y);
      }
      octx.closePath();
      const body = octx.createRadialGradient(cx - R * 0.3, cy - R * 0.35, R * 0.1, cx, cy, R * 1.15);
      body.addColorStop(0, `hsla(${h1},100%,88%,1)`); body.addColorStop(0.45, `hsla(${h1},95%,64%,1)`); body.addColorStop(1, `hsla(${h2},90%,45%,1)`);
      octx.fillStyle = body; octx.fill();
      octx.restore();
      octx.beginPath(); octx.arc(cx - R * 0.28, cy - R * 0.32, R * 0.32, 0, 7);
      octx.fillStyle = "rgba(255,255,255,0.55)"; octx.fill();
      t += 1; requestAnimationFrame(drawOrb);
    }
    drawOrb();

    // ---------- Speak (with stall watchdog) ----------
    let maleVoice = null;
    function pickVoice() {
      const voices = window.speechSynthesis ? speechSynthesis.getVoices() : [];
      if (!voices || !voices.length) return;
      const pref = ["david","daniel","alex","fred","google uk english male","microsoft david","male","guy","tom"];
      const en = voices.filter(v => /en(-|_)?/i.test(v.lang));
      for (const n of pref) { const hit = en.find(v => v.name.toLowerCase().includes(n)); if (hit) { maleVoice = hit; return; } }
      maleVoice = en[0] || voices[0];
    }
    if (window.speechSynthesis) { pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
    function forSpeech(text) {
      return String(text)
        .replace(/\*+/g, " ")
        .replace(/([A-Za-z])\s*\(\s*([A-Za-z0-9]+)\s*\)/g, "$1 of $2")
        .replace(/[()]/g, " ")
        .replace(/\s*=\s*/g, " equals ")
        .replace(/\s*\+\s*/g, " plus ")
        .replace(/(\d)\s*-\s*(\d)/g, "$1 minus $2")
        .replace(/\s-\s/g, " minus ")
        .replace(/\s*[×*]\s*/g, " times ")
        .replace(/\s*[÷]\s*/g, " divided by ")
        .replace(/(\w)\s*\/\s*(\w)/g, "$1 over $2")
        .replace(/\^/g, " to the power ")
        .replace(/√/g, " square root of ")
        .replace(/\s{2,}/g, " ").trim();
    }
    function browserSpeak(text, done) {
      if (!window.speechSynthesis) { if (done) done(); return; }
      let called = false; const finish = () => { if (called) return; called = true; if (done) done(); };
      try {
        speechSynthesis.cancel();
        const spoken = forSpeech(text);
        const u = new SpeechSynthesisUtterance(spoken);
        if (maleVoice) u.voice = maleVoice; u.rate = 1.0; u.pitch = 0.9;
        u.onstart = () => { usingAnalyser = false; setState("speaking"); };
        u.onend = finish; u.onerror = finish;
        speechSynthesis.speak(u);
        const words = spoken.split(/\s+/).filter(Boolean).length;
        setTimeout(finish, 4000 + words * 450);
      } catch (e) { finish(); }
    }
    function speak(text) {
      return new Promise((resolve) => {
        if (!text) { resolve(); return; }
        if (!elevenEnabled) { browserSpeak(text, resolve); return; }
        ensureAudioGraph();
        let started = false, doneCalled = false, lastProgress = Date.now(), watchdog = null;
        const finish = () => { if (doneCalled) return; doneCalled = true; cleanup(); resolve(); };
        const onPlaying = () => { started = true; usingAnalyser = !!analyser; setState("speaking"); lastProgress = Date.now(); };
        const onProgress = () => { lastProgress = Date.now(); };
        const onEnded = () => { finish(); };
        const onError = () => { cleanup(); if (!started) browserSpeak(text, resolve); else finish(); };
        function cleanup() {

          const a = ttsAudio;

    }

    // ---------- Control tags ----------
    function parseAttrs(s) {
      const attrs = {}; const re = /(\w+)\s*=\s*("([^"]*)"|'([^']*)'|(\S+))/g; let m;
      while ((m = re.exec(s)) !== null) attrs[m[1].toLowerCase()] = (m[3] !== undefined ? m[3] : m[4] !== undefined ? m[4] : m[5]);
      return attrs;
    }
    function handleTags(text) {
      const tagRe = /\[\[\s*([\w-]+)([^\]]*?)\]\]/g; let m;
      while ((m = tagRe.exec(text)) !== null) {
        const name = m[1].toLowerCase(), attrs = parseAttrs(m[2]);
        if (name === "balance") showBalance(attrs);
        else if (name === "card") showCard(attrs);
        else if (name === "graph") showGraph(attrs);
        else if (name === "clear") clearStage();
      }
      return text.replace(/\[\[[^\]]*\]\]/g, "").replace(/\[\[[\s\S]*$/, "").replace(/\s{2,}/g, " ").trim();
    }
    function clearStage() { stage.innerHTML = '<div class="stage-hint">Your topic will appear here.</div>'; }
    function showCard(a) {
      const items = String(a.items || "").split("|").map(s => s.trim()).filter(Boolean);
      stage.innerHTML = ""; const card = document.createElement("div"); card.className = "qcard pop";
      if (a.title) { const tt = document.createElement("div"); tt.className = "qtitle"; tt.textContent = a.title; card.appendChild(tt); }
      const ul = document.createElement("ul");
      for (const it of items) { const li = document.createElement("li"); li.textContent = it; ul.appendChild(li); }
      card.appendChild(ul);
      if (a.caption) { const c = document.createElement("div"); c.className = "qcap"; c.textContent = a.caption; card.appendChild(c); }
      stage.appendChild(card);
    }
    function iconsFor(expr) {
      const wrap = document.createElement("div"); wrap.className = "tray";
      const tokens = String(expr).split("+").map(x => x.trim()).filter(Boolean); let rendered = false;
      for (const tok of tokens) {
        if (/^\d+$/.test(tok)) { const n = Math.min(parseInt(tok, 10), 12);
          for (let i = 0; i < n; i++) wrap.appendChild(document.createTextNode("🐵")); rendered = true; }
        else if (/[a-zA-Z?]/.test(tok)) { const b = document.createElement("span"); b.className = "box"; b.textContent = tok; wrap.appendChild(b); rendered = true; }
        else { const s = document.createElement("span"); s.style.fontSize = "16px"; s.textContent = tok; wrap.appendChild(s); rendered = true; }
      }
      if (!rendered) wrap.textContent = String(expr); return wrap;
    }
    function pan(side, expr) {
      const p = document.createElement("div"); p.className = "pan " + side;
      const rope = document.createElement("div"); rope.className = "rope";
      const label = document.createElement("div"); label.className = "label"; label.textContent = expr;
      p.appendChild(rope); p.appendChild(iconsFor(expr)); p.appendChild(label); return p;
    }
    function showBalance(a) {
      const left = a.left || "", right = a.right || "", st = (a.state || "level").toLowerCase();
      let deg = 0; if (st.includes("left")) deg = -9; else if (st.includes("right")) deg = 9;
      else if (st === "tip" || st === "unbalanced") deg = -9;
      stage.innerHTML = ""; const scale = document.createElement("div"); scale.className = "scale pop";
      const bw = document.createElement("div"); bw.className = "beamwrap";
      const beam = document.createElement("div"); beam.className = "beam"; beam.style.transform = "rotate(" + deg + "deg)";
      const pivot = document.createElement("div"); pivot.className = "pivot";
      bw.appendChild(beam); bw.appendChild(pan("left", left)); bw.appendChild(pan("right", right)); bw.appendChild(pivot);
      scale.appendChild(bw);
      const eq = document.createElement("div"); eq.className = "eq"; eq.textContent = left + "  =  " + right; scale.appendChild(eq);
      if (a.caption) { const c = document.createElement("div"); c.className = "cap"; c.textContent = a.caption; scale.appendChild(c); }
      stage.appendChild(scale);
      requestAnimationFrame(() => { beam.style.transform = "rotate(" + deg + "deg)"; });
    }

    // ---------- Coordinate grapher (lines, parabolas, points) ----------
    // Driven by [[graph lines="y=2x+1; y=-x+3" parabola="y=x^2-4x+1" points="(1,3),(0,5)"
    //            caption="..." range="-10..10"]]. Draws an SVG coordinate plane.
    function parseLinear(expr) {
      let s = String(expr).replace(/\s+/g, "").toLowerCase();
      let vm = s.match(/^x=(-?\d*\.?\d+)$/);
      if (vm) return { vertical: true, x: parseFloat(vm[1]) };
      s = s.replace(/^y=/, "");
      let m = 0, b = 0, hasX = false;
      let xm = s.match(/([+-]?\d*\.?\d*)x/);
      if (xm) { hasX = true; let c = xm[1];
        m = (c === "" || c === "+") ? 1 : (c === "-" ? -1 : parseFloat(c)); s = s.replace(xm[0], ""); }
      s = s.replace(/^\+/, "");
      if (s !== "") { let bv = parseFloat(s); if (!isNaN(bv)) b = bv; }
      if (!hasX && s === "") return null;
      return { vertical: false, m, b };
    }
    function parseQuadratic(expr) {
      let s = String(expr).replace(/\s+/g, "").toLowerCase().replace(/²/g, "^2").replace(/^y=/, "");
      let am = s.match(/([+-]?\d*\.?\d*)x\^2/); if (!am) return null;
      let cc = am[1]; let a = (cc === "" || cc === "+") ? 1 : (cc === "-" ? -1 : parseFloat(cc));
      s = s.replace(am[0], ""); let lin = parseLinear("y=" + (s || "0"));
      return { a, b: lin ? lin.m : 0, c: lin ? lin.b : 0 };
    }
    function parsePts(str) {
      const pts = []; const re = /\(\s*(-?\d*\.?\d+)\s*,\s*(-?\d*\.?\d+)\s*\)/g; let m;
      while ((m = re.exec(String(str))) !== null) pts.push([parseFloat(m[1]), parseFloat(m[2])]);
      return pts;
    }
    const GRAPH_COLORS = ["#5b5bd6", "#14b8a6", "#ff7a59", "#9333ea"];
    function showGraph(a) {
      const S = 440, PAD = 28;
      let xmin = -10, xmax = 10, ymin = -10, ymax = 10;
      const rng = String(a.range || "").match(/(-?\d+)\.\.(-?\d+)/);
      if (rng) { xmin = ymin = parseInt(rng[1], 10); xmax = ymax = parseInt(rng[2], 10); }
      const plot = S - 2 * PAD;
      const mapX = (x) => PAD + (x - xmin) / (xmax - xmin) * plot;
      const mapY = (y) => PAD + (ymax - y) / (ymax - ymin) * plot;
      const esc = (t) => String(t).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      let svg = '<svg viewBox="0 0 ' + S + ' ' + S + '" class="grapher" xmlns="http://www.w3.org/2000/svg">';
      svg += '<defs><clipPath id="gclip"><rect x="' + PAD + '" y="' + PAD + '" width="' + plot + '" height="' + plot + '"/></clipPath></defs>';
      svg += '<rect x="' + PAD + '" y="' + PAD + '" width="' + plot + '" height="' + plot + '" fill="#fbfbff" stroke="#e7e6f2"/>';
      // grid + tick labels
      for (let x = xmin; x <= xmax; x++) {
        const px = mapX(x);
        svg += '<line x1="' + px + '" y1="' + PAD + '" x2="' + px + '" y2="' + (S - PAD) + '" stroke="' + (x === 0 ? "#9aa7b6" : "#eef0f7") + '" stroke-width="' + (x === 0 ? 1.5 : 1) + '"/>';
        if (x !== 0 && x % 2 === 0) svg += '<text x="' + px + '" y="' + (mapY(0) + 13) + '" font-size="10" fill="#8890a0" text-anchor="middle">' + x + '</text>';
      }
      for (let y = ymin; y <= ymax; y++) {
        const py = mapY(y);
        svg += '<line x1="' + PAD + '" y1="' + py + '" x2="' + (S - PAD) + '" y2="' + py + '" stroke="' + (y === 0 ? "#9aa7b6" : "#eef0f7") + '" stroke-width="' + (y === 0 ? 1.5 : 1) + '"/>';
        if (y !== 0 && y % 2 === 0) svg += '<text x="' + (mapX(0) - 6) + '" y="' + (py + 3) + '" font-size="10" fill="#8890a0" text-anchor="end">' + y + '</text>';
      }
      svg += '<text x="' + (S - PAD + 2) + '" y="' + (mapY(0) + 3) + '" font-size="11" fill="#6b6f82">x</text>';
      svg += '<text x="' + (mapX(0) + 4) + '" y="' + (PAD - 2) + '" font-size="11" fill="#6b6f82">y</text>';
      // lines
      const lines = String(a.lines || "").split(/[;|]/).map(s => s.trim()).filter(Boolean);
      const parsedLines = [];
      svg += '<g clip-path="url(#gclip)">';
      lines.forEach((expr, i) => {
        const L = parseLinear(expr); if (!L) return; parsedLines.push(L);
        const col = GRAPH_COLORS[i % GRAPH_COLORS.length];
        if (L.vertical) {
          svg += '<line x1="' + mapX(L.x) + '" y1="' + mapY(ymin) + '" x2="' + mapX(L.x) + '" y2="' + mapY(ymax) + '" stroke="' + col + '" stroke-width="2.5"/>';
        } else {
          svg += '<line x1="' + mapX(xmin) + '" y1="' + mapY(L.m * xmin + L.b) + '" x2="' + mapX(xmax) + '" y2="' + mapY(L.m * xmax + L.b) + '" stroke="' + col + '" stroke-width="2.5"/>';
        }
      });
      // parabolas
      const paras = String(a.parabola || a.parabolas || "").split(/[;|]/).map(s => s.trim()).filter(Boolean);
      paras.forEach((expr, i) => {
        const Q = parseQuadratic(expr); if (!Q) return;
        const col = GRAPH_COLORS[(lines.length + i) % GRAPH_COLORS.length];
        let pts = [];
        for (let x = xmin; x <= xmax + 0.001; x += 0.2) pts.push(mapX(x) + "," + mapY(Q.a * x * x + Q.b * x + Q.c));
        svg += '<polyline points="' + pts.join(" ") + '" fill="none" stroke="' + col + '" stroke-width="2.5"/>';
      });
      // intersection of the first two straight lines
      if (parsedLines.length >= 2 && !parsedLines[0].vertical && !parsedLines[1].vertical && parsedLines[0].m !== parsedLines[1].m) {
        const ix = (parsedLines[1].b - parsedLines[0].b) / (parsedLines[0].m - parsedLines[1].m);
        const iy = parsedLines[0].m * ix + parsedLines[0].b;
        if (ix >= xmin && ix <= xmax && iy >= ymin && iy <= ymax) {
          svg += '<circle cx="' + mapX(ix) + '" cy="' + mapY(iy) + '" r="5.5" fill="#fff" stroke="#e0392b" stroke-width="2.5"/>';
          svg += '<text x="' + (mapX(ix) + 9) + '" y="' + (mapY(iy) - 7) + '" font-size="11" font-weight="700" fill="#c0392b">(' + (+ix.toFixed(2)) + ", " + (+iy.toFixed(2)) + ')</text>';
        }
      }
      // points
      parsePts(a.points).forEach(([x, y]) => {
        svg += '<circle cx="' + mapX(x) + '" cy="' + mapY(y) + '" r="4.5" fill="#5b5bd6"/>';
        svg += '<text x="' + (mapX(x) + 8) + '" y="' + (mapY(y) - 6) + '" font-size="10.5" fill="#26263a">(' + x + ", " + y + ')</text>';
      });
      svg += '</g></svg>';
      // legend of the equations shown
      const legend = lines.concat(paras).map((e, i) =>
        '<span class="glg" style="color:' + GRAPH_COLORS[i % GRAPH_COLORS.length] + '">&#9644; ' + esc(e) + '</span>').join("");
      stage.innerHTML = '<div class="graphwrap pop">' + svg
        + (legend ? '<div class="glegend">' + legend + '</div>' : "")
        + (a.caption ? '<div class="cap">' + esc(a.caption) + '</div>' : "") + '</div>';
    }

    function addBubble(role, text) {
      const div = document.createElement("div"); div.className = "bubble " + role; div.textContent = text;
      if (role === "tutor") { const prev = log.querySelector(".bubble.tutor.latest"); if (prev) prev.classList.remove("latest"); div.classList.add("latest"); }
      log.appendChild(div); log.scrollTop = log.scrollHeight; return div;
    }

    // ---------- Tap-to-talk ----------
    const canRecord = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder);
    let mediaStream = null, mediaRecorder = null, chunks = [], sendOnStop = true, recTimer = null;

    const quickRow = el("quickRow");
    function setQuick(on) { quickRow.querySelectorAll(".quick.yes,.quick.no,.quick.conf").forEach(b => b.disabled = !on); }
    quickRow.querySelectorAll(".quick.yes,.quick.no,.quick.conf").forEach(b =>
      b.addEventListener("click", () => { if (phase === "ready") sendToTutor(b.dataset.say); }));
    el("newTopic").addEventListener("click", () => { if (!busy) resetToEntry(); });

    function setPhase(p) {
      phase = p;
      talkBtn.classList.remove("ready", "recording");
      if (p === "ready") {
        talkBtn.disabled = false; talkBtn.classList.add("ready"); setQuick(true); el("newTopic").disabled = false;
        talkLabel.textContent = "Tap to talk";
        hint.textContent = "Your turn — tap to talk, or use a quick button.";
        statusEl.textContent = "Your turn!"; setState("idle"); live.textContent = "";
      } else if (p === "recording") {
        talkBtn.disabled = false; talkBtn.classList.add("recording"); setQuick(false); el("newTopic").disabled = true;
        talkLabel.textContent = "Tap when you're done";
        hint.textContent = "Recording — say your answer, then tap when you're finished.";
        statusEl.textContent = "🎤 Recording…"; setState("listening"); live.textContent = "Recording…";
      } else {
        talkBtn.disabled = true; talkLabel.textContent = "…"; live.textContent = ""; setQuick(false); el("newTopic").disabled = true;
      }
    }
    function releaseMic() { if (mediaStream) { try { mediaStream.getTracks().forEach(t => t.stop()); } catch (e) {} mediaStream = null; } }
    async function startRecording() {
      if (phase !== "ready" || !canRecord) return;
      ensureAudioGraph();
      try { mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
      catch (e) { hint.textContent = "I need microphone access to hear you. Allow the mic, then tap again — or use 'Type instead'."; return; }
      chunks = []; sendOnStop = true;
      try { mediaRecorder = new MediaRecorder(mediaStream); }
      catch (e) { try { mediaRecorder = new MediaRecorder(mediaStream, { mimeType: "audio/webm" }); }
        catch (_) { hint.textContent = "Recording isn't supported here — use 'Type instead'."; releaseMic(); return; } }
      mediaRecorder.ondataavailable = (ev) => { if (ev.data && ev.data.size) chunks.push(ev.data); };
      mediaRecorder.onstop = onRecordingStop; mediaRecorder.start();
      setPhase("recording"); recTimer = setTimeout(() => stopRecording(true), 30000);
    }

      clearTimeout(recTimer); sendOnStop = send;
      try { if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop(); } catch (e) {}
    }
    async function onRecordingStop() {
      releaseMic();
      if (!sendOnStop) { setPhase("ready"); return; }
      const blob = new Blob(chunks, { type: (chunks[0] && chunks[0].type) || "audio/webm" });
      if (!blob.size) { setPhase("ready"); hint.textContent = "I didn't catch anything — tap and try again."; return; }
      phase = "busy"; talkBtn.disabled = true; talkBtn.classList.remove("ready", "recording"); talkLabel.textContent = "…";
      setState("thinking"); statusEl.textContent = "Got it — one sec…"; live.textContent = "";
      const text = await transcribe(blob);
      if (text) { sendToTutor(text); }
      else { setPhase("ready"); hint.textContent = "I didn't quite catch that — tap and try again."; }
    }
    async function transcribe(blob) {
      try {
        const fd = new FormData(); fd.append("audio", blob, "speech.webm");
        const res = await fetch("/api/transcribe", { method: "POST", body: fd });
        const data = await res.json();
        return (data.text || "").trim();
      } catch (e) { return ""; }
    }
    talkBtn.addEventListener("click", () => {
      if (phase === "ready") startRecording();
      else if (phase === "recording") stopRecording(true);
    });

    // ---------- Talk to the tutor ----------
    async function sendToTutor(message) {
      if (busy) return;
      busy = true; setPhase("busy");
      addBubble("student", message);
      history.push({ role: "user", content: message });
      await runTutor(message);
    }
    async function runTutor(message) {
      setState("thinking"); statusEl.textContent = "Mr. Cadabra is thinking…";
      try {
        const res = await fetch("/api/topic", { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code: CODE, topic, message, history: history.slice(0, -1) }) });
        const data = await res.json();
        let reply = res.ok ? data.reply : (data.detail || "Sorry, something went wrong.");
        reply = handleTags(reply);
        addBubble("tutor", reply);
        history.push({ role: "assistant", content: reply });
        statusEl.textContent = "Mr. Cadabra is talking…";
        await speak(reply);
      } catch (e) { statusEl.textContent = "I couldn't reach the server."; }

    }

    // ---------- Text fallback ----------
    function showComposer() { composer.classList.add("show"); typeToggle.style.display = "none"; if (input) input.focus(); }
    typeToggle.addEventListener("click", showComposer);
    function sendTyped() { const m = (input.value || "").trim(); if (!m || busy) return; input.value = ""; ensureAudioGraph(); sendToTutor(m); }
    if (sendBtn) sendBtn.addEventListener("click", sendTyped);
    if (input) input.addEventListener("keydown", (e) => { if (e.key === "Enter") sendTyped(); });

    // ---------- Topic entry ----------
    const entry = el("entry"), topicInput = el("topicInput"), entryGo = el("entryGo"), entryMic = el("entryMic");
    const unitGrid = el("unitGrid");
    UNITS.forEach((u, i) => {
      const b = document.createElement("button"); b.className = "unitbtn";
      b.innerHTML = '<span class="n">' + (i + 1) + '.</span><span>' + u + '</span>';
      b.addEventListener("click", () => startTopic(u));
      unitGrid.appendChild(b);
    });
    topicInput.addEventListener("input", () => { entryGo.disabled = !topicInput.value.trim(); });
    topicInput.addEventListener("keydown", (e) => { if (e.key === "Enter" && topicInput.value.trim()) startTopic(topicInput.value.trim()); });

    let entryStream = null, entryRec = null, entryChunks = [], entryRecording = false;
    entryMic.addEventListener("click", async () => {
      if (!canRecord) { el("entryNote").textContent = "Voice isn't supported here — please type a topic."; return; }
      if (entryRecording) { try { entryRec && entryRec.state !== "inactive" && entryRec.stop(); } catch (e) {} return; }
      try { entryStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
      catch (e) { el("entryNote").textContent = "I need mic access to hear the topic — allow it, or type it."; return; }
      entryChunks = [];
      try { entryRec = new MediaRecorder(entryStream); } catch (e) { try { entryRec = new MediaRecorder(entryStream, { mimeType: "audio/webm" }); } catch (_) { el("entryNote").textContent = "Recording isn't supported here — please type a topic."; return; } }
      entryRec.ondataavailable = (ev) => { if (ev.data && ev.data.size) entryChunks.push(ev.data); };
      entryRec.onstop = async () => {
        entryRecording = false; entryMic.classList.remove("recording"); entryMic.textContent = "🎙️";
        try { entryStream.getTracks().forEach(t => t.stop()); } catch (e) {}
        const blob = new Blob(entryChunks, { type: (entryChunks[0] && entryChunks[0].type) || "audio/webm" });
        if (!blob.size) { el("entryNote").textContent = "I didn't catch that — try again or type it."; return; }
        el("entryNote").textContent = "Got it — one sec…";
        const text = await transcribe(blob);
        if (text) { topicInput.value = text; entryGo.disabled = false; el("entryNote").textContent = "Check it looks right, then press the button."; }
        else { el("entryNote").textContent = "I couldn't quite hear that — try again or type it."; }
      };
      entryRec.start(); entryRecording = true; entryMic.classList.add("recording"); entryMic.textContent = "⏹";
      setTimeout(() => { if (entryRecording) { try { entryRec.stop(); } catch (e) {} } }, 30000);
    });
    entryGo.addEventListener("click", () => { const tp = (topicInput.value || "").trim(); if (tp) startTopic(tp); });

    async function startTopic(tp) {
      topic = tp;
      el("topicText").textContent = tp; el("topicBar").classList.add("show");
      entry.classList.add("hide");
      ensureAudioGraph(); await warmUpAudio();
      if (canRecord) { try { const s = await navigator.mediaDevices.getUserMedia({ audio: true }); s.getTracks().forEach(t => t.stop()); } catch (e) {} }
      else { showComposer(); }
      busy = true; setPhase("busy");
      const opener = "I'd like to explore: " + tp;
      addBubble("student", opener);
      history.push({ role: "user", content: opener });
      await runTutor(opener);
    }

    function resetToEntry() {
      topic = ""; history = [];
      log.innerHTML = ""; clearStage();
      el("topicBar").classList.remove("show"); el("topicText").textContent = "";
      topicInput.value = ""; entryGo.disabled = true; el("entryNote").textContent = "";
      composer.classList.remove("show"); typeToggle.style.display = "";
      setPhase("idle"); statusEl.textContent = "";
      entry.classList.remove("hide"); topicInput.focus();
    }

    // ---------- Load ----------
    async function loadVoice() {
      try { const vs = await fetch("/api/voice-status"); if (vs.ok) elevenEnabled = !!(await vs.json()).eleven; } catch (e) {}
      if (!canRecord) { talkBtn.style.display = "none"; hint.textContent = "Voice recording isn't supported here — type instead."; }
    }
    loadVoice();

    window.__setState = setState;
  </script>
